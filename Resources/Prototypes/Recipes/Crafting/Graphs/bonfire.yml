- type: constructionGraph
  id: Bonfire
  start: start
  graph:

  - node: start
    edges:
    - to: unlit # Floof
      steps:
      - material: WoodPlank
        amount: 15 # Floof - increase for parity
        doAfter: 4

  # Floofstation - bonfire starts unlit
  - node: unlit
    entity: BonfireConstructionUnlit
    edges:
    - to: start
      completed:
      - !type:SpawnPrototype
        prototype: MaterialWoodPlank1
        amount: 15 # Floof - see above
      - !type:DeleteEntity { }
      steps:
      - tool: Prying
        doAfter: 4
    - to: bonfire
      steps:
      - tool: Welding
        doAfter: 4
    # Floofsstation section end

  - node: bonfire
    entity: Bonfire
    edges:
    # Floofstation - edge to unlit, not to start
    - to: unlit
#      completed:
#      - !type:SpawnPrototype
#        prototype: MaterialWoodPlank1
#        amount: 15 # Floof - see above
#      - !type:DeleteEntity { }
      steps:
      - tool: Prying
        doAfter: 4
    - to: bonfireStake
      completed:
      - !type:AdminLog
        message: "Construction"
        impact: High
      steps:
      - material: WoodPlank
        amount: 2
        doAfter: 2

  - node: bonfireStake
    entity: BonfireStake
    edges:
    - to: bonfire
      completed:
      - !type:SpawnPrototype
        prototype: MaterialWoodPlank1
        amount: 2
      steps:
      - tool: Prying
        doAfter: 1
