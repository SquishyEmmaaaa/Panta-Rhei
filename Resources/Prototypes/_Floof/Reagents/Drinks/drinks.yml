- type: reagent
  id: NikkosNaughtyNectar
  name: reagent-name-NNN
  parent: BaseDrink
  desc: reagent-desc-NNN
  physicalDesc: reagent-physical-desc-creamy
  flavor: nikkonectar
  color: "#deebff"
  recognizable: true
  viscosity: 0.15
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 2
    Medicine:
      metabolismRate : 0.5
      effects:
      - !type:PopupMessage
        type: Local
        visualType: Medium
        messages:
          - "reagent-effect-aphrodisiac-mild1"
          - "reagent-effect-aphrodisiac-mild2"
          - "reagent-effect-aphrodisiac-mild3"
          - "reagent-effect-aphrodisiac-mild4"
          - "reagent-effect-aphrodisiac-mild5"
        probability: 0.02
        conditions:
          - !type:ReagentCondition
            reagent: NikkosNaughtyNectar
            max: 50
          - !type:ConsentCondition
            consent: Aphrodisiacs
  footstepSound:
    collection: FootstepSticky
    params:
      volume: 3

- type: reagent
  id: BoykissersEnergy
  name: reagent-name-boykisser-energy
  parent: BaseDrink
  desc: reagent-desc-boykisser-energy
  physicalDesc: reagent-physical-desc-bubbly
  flavor: nutty
  color: "#FD3DB5"
  recognizable: false
  viscosity: 0.15
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 2
    Narcotic:
      effects:
      - !type:MovementSpeedModifier
        walkSpeedModifier: 1.15
        sprintSpeedModifier: 1.15
      - !type:GenericStatusEffect
        key: Stutter
        component: StutteringAccent
      - !type:Jitter
      - !type:GenericStatusEffect
        key: Drowsiness
        time: 10
        type: Remove
    Medicine:
      effects:
      - !type:ResetNarcolepsy
        conditions:
        - !type:ReagentCondition
          reagent: BoykissersEnergy
          min: 20
  footstepSound:
    collection: FootstepSticky
    params:
      volume: 3

- type: reagent
  id: VBBeer
  name: reagent-name-VB-beer
  parent: BaseAlcohol
  desc: reagent-desc-VB-beer
  physicalDesc: reagent-physical-desc-bubbly
  flavor: vbbeer
  color: "#e3e77b"
  recognizable: true
  fizziness: 0.6
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 3
      - !type:AdjustReagent
        reagent: Ethanol
        amount: 0.06
      - !type:AdjustReagent # Will find a way to make it so only someone with the Australian Accent component heals later
        reagent: Ichor
        amount: 0.2

- type: reagent # You may ask me why, but I got sick of seeing green come of cream pies.
  id: BananaCreamPie
  parent: Nutriment
  name: reagent-name-bananacreampie
  desc: reagent-desc-bananacreampie
  physicalDesc: reagent-physical-desc-creamy
  flavor: bananacreampie
  color: "#fffdd0"
  recognizable: true
  metabolisms:
    Food:
      effects:
      - !type:SatiateHunger
      - !type:SatiateThirst
        factor: 0.5
      - !type:HealthChange # I folded vitamins into it
        probability: 0.5
        damage:
          groups:
            Brute: -0.1 # For reference vitamins are -0.5
            Burn: -0.1
      - !type:ModifyBleed
        amount: -0.1 # 0.25
